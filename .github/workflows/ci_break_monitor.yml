name: XPU CI Break Monitor
on:
  schedule:
    - cron: '0 4 * * *'  # Every day UTC 4:00 (Beijing 12:00)
  workflow_dispatch:
    inputs:
      days:
        description: 'Look back N days'
        default: '1'
      parse_logs:
        description: 'Parse job logs for test names'
        type: boolean
        default: true

jobs:
  check-xpu-ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install requests

      - name: Check XPU CI status
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.PYTORCH_TOKEN }}
        run: |
          python tools/ci_monitor/check_nightly_status.py \
            --days ${{ inputs.days || '1' }} \
            ${{ inputs.parse_logs && '--parse-logs' || '--parse-logs' }} \
            --output ci_results.json

      - name: Create tracking issue (if failures)
        if: steps.check.outputs.has_failures == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python tools/ci_monitor/create_tracking_issue.py \
            --input ci_results.json

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ci-results
          path: ci_results.json
